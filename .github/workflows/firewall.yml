name: Open Firewall 8013

on:
  push:
    branches:
      - main

jobs:
  firewall:
    runs-on: ubuntu-latest
    permissions:
      id-token: 'write'
      contents: 'read'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/966609209672/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@wayn-492112.iam.gserviceaccount.com'

      - name: Setup GCloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Create Firewall Rule
        run: |
          echo "방화벽 규칙 생성을 시도합니다..."
          gcloud compute firewall-rules create allow-port-8013 \
            --direction=INGRESS \
            --priority=1000 \
            --network=default \
            --action=ALLOW \
            --rules=tcp:8013 \
            --source-ranges=0.0.0.0/0 \
            --target-tags=http-server,https-server \
            || echo "방화벽 규칙 생성 권한이 없거나 이미 존재합니다."
          
          # 현재 할당된 방화벽 규칙 확인
          gcloud compute firewall-rules list --filter="name:allow-port-8013"
