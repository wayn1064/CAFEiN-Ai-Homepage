name: Backup Corrupted Compose file

on:
  push:
    branches:
      - backup 

env:
  PROJECT_ID: wayn-492112
  REGION: asia-northeast3
  REPO_NAME: wayn-ai-repo
  GCE_INSTANCE: "wayn-server"
  GCE_ZONE: "asia-northeast3-a"

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: 'write'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/966609209672/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@wayn-492112.iam.gserviceaccount.com'

      - name: Download from GCE and Commit
        run: |
          gcloud compute ssh wayn-ai@${{ env.GCE_INSTANCE }} --zone=${{ env.GCE_ZONE }} --command="cat ~/wayn-deployment/GCE_docker-compose.prod.yml" > corrupted-compose.yml
          
          git config --global user.name "GitHub Action Data Fetcher"
          git config --global user.email "bot@example.com"
          git add corrupted-compose.yml
          git commit -m "chore: backup corrupted compose file for fixing"
          git push origin backup
