name: Diagnostic Server State

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    permissions:
      contents: 'write'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/966609209672/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@wayn-492112.iam.gserviceaccount.com'

      - name: Gather Diagnostic Info
        run: |
          gcloud compute ssh wayn-ai@wayn-server --zone=asia-northeast3-a --command="
            echo '==== DOCKER PS ====' > ~/debug.txt
            docker ps >> ~/debug.txt
            echo '==== NGINX PORTS ====' >> ~/debug.txt
            docker port nginx >> ~/debug.txt
            echo '==== COMPOSE FILE ====' >> ~/debug.txt
            cat ~/wayn-deployment/GCE_docker-compose.prod.yml >> ~/debug.txt
            echo '==== NGINX CONF ====' >> ~/debug.txt
            cat ~/wayn-deployment/nginx/conf.d/cafein-ai-homepage.conf >> ~/debug.txt
            echo '==== NGINX ERROR LOG ====' >> ~/debug.txt
            docker logs --tail 50 nginx >> ~/debug.txt 2>&1
          "
          
          gcloud compute scp wayn-ai@wayn-server:~/debug.txt ./debug.txt --zone=asia-northeast3-a
          
          git config --global user.name "GitHub Action Data Fetcher"
          git config --global user.email "bot@example.com"
          git add debug.txt
          git commit -m "chore: add server diagnostic logs"
          git push origin main
