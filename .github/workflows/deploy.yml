name: Build and Deploy

on:
  push:
    branches:
      - main 

env:
  PROJECT_ID: wayn-492112
  REGION: asia-northeast3
  REPO_NAME: wayn-ai-repo
  GCE_INSTANCE: "wayn-server"
  GCE_ZONE: "asia-northeast3-a"
  SERVICE_NAME: "cafein-ai-homepage"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/966609209672/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@wayn-492112.iam.gserviceaccount.com'

      - name: Configure Docker
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'

      - name: Build and Push Docker Image
        run: |
          docker build --platform linux/amd64 -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/966609209672/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@wayn-492112.iam.gserviceaccount.com'

      - name: Deploy to GCE and Configure Nginx
        run: |
          echo "GCE 배포 및 Nginx 동적 연결 시작..."
          gcloud compute ssh wayn-ai@${{ env.GCE_INSTANCE }} --zone=${{ env.GCE_ZONE }} --command="
            gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet
            cd ~/wayn-deployment
            
            # 파이썬으로 안전하게 docker-compose 파일의 services 항목 하위에 추가하고, 최하단에 잘못 추가된 기존 항목 제거
            cat << 'PYEOF' > fix_compose.py
import os, re
file_path = 'GCE_docker-compose.prod.yml'
with open(file_path, 'r') as f:
    orig_text = f.read()

# 1. 문서 맨 끝이나 volumes 쪽에 잘못 들어간 cafein-ai-homepage 블록 제거
text = re.sub(r'\n\s*${{ env.SERVICE_NAME }}:\s*\n\s*image:.*?\n\s*restart:.*?\n', '\n', orig_text)

# 2. 올바른 services 하위에 다시 추가 (이미 존재하지 않으면)
if '  ${{ env.SERVICE_NAME }}:' not in text:
    block = '''  ${{ env.SERVICE_NAME }}:
    image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest
    restart: always
'''
    text = text.replace('services:\n', 'services:\n' + block)

with open(file_path, 'w') as f:
    f.write(text)
PYEOF

            python3 fix_compose.py
            
            docker-compose -f GCE_docker-compose.prod.yml pull ${{ env.SERVICE_NAME }}
            docker-compose -f GCE_docker-compose.prod.yml up -d ${{ env.SERVICE_NAME }}
            
            # Nginx 라우팅 설정 파일 위치 확인 후 추가
            mkdir -p nginx/conf.d
            cat << 'EOF' > nginx/conf.d/${{ env.SERVICE_NAME }}.conf
server {
    listen 8013;
    server_name _;

    location / {
        proxy_pass http://${{ env.SERVICE_NAME }}:80;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
    }

    location /api/cafein/ {
        proxy_pass http://wayn-ai-backend:3000/api/cafein/;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
    }
}
EOF
            docker-compose -f GCE_docker-compose.prod.yml restart nginx
          "
