name: Build and Deploy

on:
  push:
    branches:
      - main 

env:
  PROJECT_ID: wayn-492112
  REGION: asia-northeast3
  REPO_NAME: wayn-ai-repo
  GCE_INSTANCE: "wayn-server"
  GCE_ZONE: "asia-northeast3-a"
  SERVICE_NAME: "cafein-ai-homepage"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/966609209672/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@wayn-492112.iam.gserviceaccount.com'

      - name: Configure Docker
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'

      - name: Build and Push Docker Image
        run: |
          docker build --platform linux/amd64 -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/966609209672/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@wayn-492112.iam.gserviceaccount.com'

      - name: Deploy to GCE and Configure Nginx
        run: |
          echo "GCE 배포 및 Nginx 동적 연결 시작..."
          gcloud compute ssh wayn-ai@${{ env.GCE_INSTANCE }} --zone=${{ env.GCE_ZONE }} --command="
            gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet
            cd ~/wayn-deployment
            
            # 컨테이너 이미지 재다운로드 및 백그라운드 재시작
            docker-compose -f GCE_docker-compose.prod.yml pull ${{ env.SERVICE_NAME }}
            docker-compose -f GCE_docker-compose.prod.yml up -d ${{ env.SERVICE_NAME }}
            
            # Nginx 라우팅 설정 파일 위치 확인 후 추가
            mkdir -p nginx/conf.d
            printf 'server {\n    listen 8013;\n    server_name _;\n\n    location / {\n        proxy_pass http://%s:80;\n        proxy_set_header Host \$host;\n        proxy_set_header X-Real-IP \$remote_addr;\n        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto \$scheme;\n    }\n\n    location /api/cafein/ {\n        proxy_pass http://wayn-ai-backend:3000/api/cafein/;\n        proxy_set_header Host \$host;\n        proxy_set_header X-Real-IP \$remote_addr;\n        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto \$scheme;\n    }\n}\n' '${{ env.SERVICE_NAME }}' > nginx/conf.d/${{ env.SERVICE_NAME }}.conf
            
            # Nginx 라우터용 컨테이너도 갱신
            docker-compose -f GCE_docker-compose.prod.yml up -d nginx
          "
