name: Build and Deploy

on:
  push:
    branches:
      - main 

env:
  PROJECT_ID: wayn-492112
  REGION: asia-northeast3
  REPO_NAME: wayn-ai-repo
  GCE_INSTANCE: "wayn-server"
  GCE_ZONE: "asia-northeast3-a"
  SERVICE_NAME: "cafein-ai-homepage"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/966609209672/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@wayn-492112.iam.gserviceaccount.com'

      - name: Configure Docker
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'

      - name: Build and Push Docker Image
        run: |
          docker build --platform linux/amd64 -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/966609209672/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@wayn-492112.iam.gserviceaccount.com'

      - name: Deploy to GCE and Configure Nginx
        run: |
          echo "GCE 배포 및 Nginx 동적 연결 시작..."
          gcloud compute ssh wayn-ai@${{ env.GCE_INSTANCE }} --zone=${{ env.GCE_ZONE }} --command="
            gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet
            cd ~/wayn-deployment
            
            # Python 코드로 안전하게 YAML을 수정하여 포트 중복이나 에러를 원천 차단
            cat << 'PYTHONEOF' > update_compose.py
import sys, json, re

try:
    with open('GCE_docker-compose.prod.yml', 'r') as f:
        content = f.read()

    # Remove existing service block if it exists
    lines = content.split('\n')
    new_lines = []
    skip = False
    for line in lines:
        if line.startswith('  ${{ env.SERVICE_NAME }}:'):
            skip = True
            continue
        if skip:
            # If we hit a new top-level service or comment (2 spaces indent)
            if line.startswith('  #') or (line.startswith('  ') and not line.startswith('    ') and line.strip() != ''):
                skip = False
            else:
                continue
        if not skip:
            new_lines.append(line)
            
    content = '\n'.join(new_lines)

    # Insert the correct block
    service_block = '''  ${{ env.SERVICE_NAME }}:
    container_name: ${{ env.SERVICE_NAME }}
    image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest
    restart: always
    networks:
      - wayn-network
'''
    # Use robust regex replacement to handle \r or trailing spaces after 'services:'
    content = re.sub(r'^services:\s*$', 'services:\n' + service_block, content, flags=re.MULTILINE)
    
    # Nginx에 8013 포트 확보 (이미 있으면 스킵)
    if '8013:8013' not in content:
        # nginx 포트 섹션을 찾아 바로 아래에 추가
        content = re.sub(r'(\s*nginx:.*?ports:\n)', r'\1      - "8013:8013"\n', content, flags=re.DOTALL)
        
    with open('GCE_docker-compose.prod.yml', 'w') as f:
        f.write(content)
        
    print("Python update success")
except Exception as e:
    print('Failed:', e)
    sys.exit(1)
PYTHONEOF
            python3 update_compose.py
            
            docker-compose -f GCE_docker-compose.prod.yml pull ${{ env.SERVICE_NAME }}
            docker-compose -f GCE_docker-compose.prod.yml up -d ${{ env.SERVICE_NAME }}
            
            mkdir -p nginx/conf.d
            # Nginx 라우팅 파일 생성 (escape 이슈 없이 순수 생성)
            cat << 'NGINXEOF' > nginx/conf.d/${{ env.SERVICE_NAME }}.conf
server {
    listen 8013;
    server_name _;

    location / {
        proxy_pass http://${{ env.SERVICE_NAME }}:80;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
    }

    location /api/cafein/ {
        proxy_pass http://wayn-ai-backend:3000/api/cafein/;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
    }

    location /api/wayn-ai/ {
        resolver 127.0.0.11 valid=30s;
        set \$backend http://wayn-ai-backend:5001;
        rewrite ^/api/wayn-ai/(.*)\$ /api/\$1 break;
        proxy_pass \$backend;
    }
}
NGINXEOF
            # \$ 기호를 $ 기호로 변경하여 Nginx 문법 에러 회피
            sed -i 's/\\\\\\$/$/g' nginx/conf.d/${{ env.SERVICE_NAME }}.conf
            sed -i 's/\\$/$/g' nginx/conf.d/${{ env.SERVICE_NAME }}.conf || true
            
            # 컨테이너 포트 재결합을 위해 강제 재생성 수행
            docker-compose -f GCE_docker-compose.prod.yml up -d --force-recreate nginx
            docker restart nginx
          "
