name: Build and Deploy

on:
  push:
    branches:
      - main 

env:
  PROJECT_ID: wayn-492112
  REGION: asia-northeast3
  REPO_NAME: wayn-ai-repo
  GCE_INSTANCE: "wayn-server"
  GCE_ZONE: "asia-northeast3-a"
  SERVICE_NAME: "cafein-ai-homepage"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/966609209672/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@wayn-492112.iam.gserviceaccount.com'

      - name: Configure Docker
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'

      - name: Build and Push Docker Image
        run: |
          docker build --platform linux/amd64 -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/966609209672/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@wayn-492112.iam.gserviceaccount.com'

      - name: Deploy to GCE and Configure Nginx
        run: |
          echo "GCE 배포 및 Nginx 동적 연결 시작..."
          gcloud compute ssh wayn-ai@${{ env.GCE_INSTANCE }} --zone=${{ env.GCE_ZONE }} --command="
            gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet
            cd ~/wayn-deployment
            
            # docker-compose.prod.yml 에 cafein-ai-homepage 서비스 추가 확인 및 갱신
            if ! grep -q '${{ env.SERVICE_NAME }}:' GCE_docker-compose.prod.yml; then
              echo '
  ${{ env.SERVICE_NAME }}:
    image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest
    restart: always' >> GCE_docker-compose.prod.yml
            fi
            
            docker-compose -f GCE_docker-compose.prod.yml pull ${{ env.SERVICE_NAME }}
            docker-compose -f GCE_docker-compose.prod.yml up -d ${{ env.SERVICE_NAME }}
            
            # GCE Nginx 설정 (포트 8013) 추가
            if [ ! -f nginx/conf.d/${{ env.SERVICE_NAME }}.conf ]; then
              cat << 'EOF' > nginx/conf.d/${{ env.SERVICE_NAME }}.conf
server {
    listen 8013;
    server_name _;

    location / {
        proxy_pass http://${{ env.SERVICE_NAME }}:80;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
    }

    location /api/cafein/ {
        proxy_pass http://wayn-ai-backend:3000/api/cafein/;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
    }
}
EOF
              docker-compose -f GCE_docker-compose.prod.yml restart nginx
            fi
          "
